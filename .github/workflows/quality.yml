name: Quality

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Python scripts
        run: python -m py_compile scripts/check_site.py

      - name: Validate static site
        run: python scripts/check_site.py

      - name: Validate manifest JSON
        run: python -m json.tool site.webmanifest > /dev/null

      - name: Validate JavaScript syntax
        run: node --check assets/js/main.js

      - name: Validate Lighthouse config syntax
        run: node --check .lighthouserc.js

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lhci_reports
          if-no-files-found: ignore
